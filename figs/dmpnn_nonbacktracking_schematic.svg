<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1400"
     height="950"
     viewBox="0 0 1400 950">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <!-- Larger arrowheads -->
    <marker id="arrowHeadBlue" markerWidth="28" markerHeight="28" refX="15" refY="14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 28 14 L 0 28 z" fill="#0B55B7" />
    </marker>
    <marker id="arrowHeadOrange" markerWidth="28" markerHeight="28" refX="15" refY="14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 28 14 L 0 28 z" fill="#F47C00" />
    </marker>
    <marker id="arrowHeadGray" markerWidth="28" markerHeight="28" refX="15" refY="14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 28 14 L 0 28 z" fill="#A7A7A7" />
    </marker>

    <style>
      .math {
        font-family: "Times New Roman", "STIX Two Math", "Cambria Math", serif;
        font-style: italic;
      }
      .superscript,
      .subscript {
        font-size: 70%;
      }
      .superscript {
        baseline-shift: super;
      }
      .subscript {
        baseline-shift: sub;
      }
      .arrow {
        stroke-linecap: round;
        marker-end: url(#arrowHeadBlue);
      }
      .arrow-orange {
        stroke-linecap: round;
        marker-end: url(#arrowHeadOrange);
      }
      .arrow-gray {
        stroke-linecap: round;
        marker-end: url(#arrowHeadGray);
      }
      .glow {
        filter: drop-shadow(0px 0px 10px rgba(11, 85, 183, 0.95));
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <!-- Separated bidirectional directed edges -->

<!-- w1 <-> u -->
<line x1="420.2" y1="227.0" x2="603.9" y2="420.5" class="arrow" stroke="#0B55B7" stroke-width="8" />
<line x1="646.4" y1="412.7" x2="452.7" y2="215.2" class="arrow-orange" stroke="#F47C00" stroke-width="8" />

<!-- w2 <-> u -->
<line x1="965.1" y1="172.8" x2="765.3" y2="386.2" class="arrow" stroke="#0B55B7" stroke-width="8" />
<line x1="759.3" y1="449.5" x2="973.1" y2="226.1" class="arrow-orange" stroke="#F47C00" stroke-width="8" />

<!-- w3 <-> u -->
<line x1="295.4" y1="522.1" x2="601.7" y2="501.7" class="arrow" stroke="#0B55B7" stroke-width="8" />
<line x1="597.4" y1="475.7" x2="301.1" y2="496.1" class="arrow-orange" stroke="#F47C00" stroke-width="8" />

<!-- wk <-> u -->
<line x1="716.0" y1="753.0" x2="716.0" y2="582.0" class="arrow" stroke="#0B55B7" stroke-width="8" />
<line x1="682.0" y1="572.0" x2="682.0" y2="743.0" class="arrow-orange" stroke="#F47C00" stroke-width="8" />

  <!-- Active message u -> v and excluded reverse message v -> u -->
  <g class="glow">
    <line x1="803.6" y1="470.8" x2="1100.9" y2="488.2" class="arrow" stroke="#0B55B7" stroke-width="9" />
  </g>

  <line x1="1100.4" y1="524.1" x2="800.1" y2="505.7" class="arrow-gray" stroke="#A7A7A7" stroke-width="8" opacity="0.9" />

  <g id="blocked-x" stroke="#E60012" stroke-width="9" stroke-linecap="round">
    <line x1="942" y1="500" x2="982" y2="540"/>
    <line x1="982" y1="500" x2="942" y2="540"/>
  </g>

  <!-- Nodes -->
  <circle cx="400" cy="155" r="69" fill="#FFFFFF" filter="url(#softShadow)" />
  <circle cx="400" cy="155" r="62" fill="#009E95" />
  <text x="400.0" y="169.0" class="math" font-size="44" fill="#FFFFFF" text-anchor="middle">w₁</text>

  <circle cx="1000" cy="155" r="69" fill="#FFFFFF" filter="url(#softShadow)" />
  <circle cx="1000" cy="155" r="62" fill="#009E95" />
  <text x="1000.0" y="169.0" class="math" font-size="44" fill="#FFFFFF" text-anchor="middle">w₂</text>

  <circle cx="220" cy="500" r="69" fill="#FFFFFF" filter="url(#softShadow)" />
  <circle cx="220" cy="500" r="62" fill="#009E95" />
  <text x="220.0" y="514.0" class="math" font-size="44" fill="#FFFFFF" text-anchor="middle">w₃</text>

  <circle cx="700" cy="825" r="69" fill="#FFFFFF" filter="url(#softShadow)" />
  <circle cx="700" cy="825" r="62" fill="#009E95" />
  <text x="700.0" y="839.0" class="math" font-size="44" fill="#FFFFFF" text-anchor="middle">wₖ</text>

  <circle cx="1180" cy="500" r="69" fill="#FFFFFF" filter="url(#softShadow)" />
  <circle cx="1180" cy="500" r="62" fill="#009E95" />
  <!-- right node -->
  <text x="1180.0" y="514.0" class="math" font-size="44" fill="#FFFFFF" text-anchor="middle">u</text>

  <circle cx="700" cy="470" r="95" fill="#FFFFFF" filter="url(#softShadow)" />
  <circle cx="700" cy="470" r="88" fill="#083E78" />
  <!-- center node -->
  <text x="700.0" y="484.0" class="math" font-size="54" fill="#FFFFFF" text-anchor="middle">v</text>

  <!-- Node feature labels -->
  <text x="400.0" y="65.0" class="math" font-size="34" fill="#111111" text-anchor="middle">x<tspan class="subscript">w₁</tspan></text>
  <text x="1000.0" y="65.0" class="math" font-size="34" fill="#111111" text-anchor="middle">x<tspan class="subscript">w₂</tspan></text>
  <text x="120.0" y="505.0" class="math" font-size="34" fill="#111111" text-anchor="middle">x<tspan class="subscript">w₃</tspan></text>
  <text x="700.0" y="925.0" class="math" font-size="34" fill="#111111" text-anchor="middle">x<tspan class="subscript">wₖ</tspan></text>
  <!-- node feature labels -->
  <text x="1275.0" y="505.0" class="math" font-size="34" fill="#111111" text-anchor="middle">x<tspan class="subscript">u</tspan></text>
  <text x="700.0" y="355.0" class="math" font-size="34" fill="#111111" text-anchor="middle">x<tspan class="subscript">v</tspan></text>
  
  <!-- Incoming messages into v -->
  <text x="465.0" y="350.0" class="math" font-size="34" fill="#0B55B7" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">w₁v</tspan></text>
  <text x="815.0" y="270.0" class="math" font-size="34" fill="#0B55B7" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">w₂v</tspan></text>
  <text x="445.0" y="555.0" class="math" font-size="34" fill="#0B55B7" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">w₃v</tspan></text>
  <text x="775.0" y="675.0" class="math" font-size="34" fill="#0B55B7" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">wₖv</tspan></text>
  
  <!-- Opposite directed hidden states -->
  <text x="565.0" y="275.0" class="math" font-size="34" fill="#F47C00" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">vw₁</tspan></text>
  <text x="925.0" y="345.0" class="math" font-size="34" fill="#F47C00" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">vw₂</tspan></text>
  <text x="435.0" y="460.0" class="math" font-size="34" fill="#F47C00" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">vw₃</tspan></text>
  <text x="630.0" y="680.0" class="math" font-size="34" fill="#F47C00" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">vwₖ</tspan></text>
  
  <!-- Active and excluded directed hidden states -->
  <text x="940.0" y="445.0" class="math" font-size="44" fill="#0B55B7" text-anchor="middle">h<tspan class="superscript">(t)</tspan><tspan class="subscript" dx="-0.75em">vu</tspan></text>
  <text x="950.0" y="570.0" class="math" font-size="34" fill="#A7A7A7" text-anchor="middle">h<tspan class="superscript">(t−1)</tspan><tspan class="subscript" dx="-1.65em">uv</tspan></text>
</svg>
